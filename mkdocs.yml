site_name: Inventory Management System
site_description: A Django-based Inventory Management System (SGE - Sistema de Gestão de Estoque) that allows you to manage products, suppliers, and stock movements (inflows/outflows), providing a dashboard with metrics and charts. It also includes an optional AI insights module to generate short daily inventory/sales recommendations based on system data.
site_author: GabrielDLobo

docs_dir: docs

theme: 
  name: material
  palette:
    primary: navy blue
  font:
    text: Roboto

nav:
  - Home: index.md
  - Overview: overview.md
  - Prerequisites: prerequisites.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Guidelines and Standards: guidelines.md
  - Project Structure: project-structure.md
  - API Endpoints: api-endpoints.md
  - System Modeling: system-modeling.md
  - Authentication and Security: authentication-security.md
  - Development: development.md
  - Testing: testing.md
  - Deploy: deploy.md
  - Contribution: contribution.md
  - Image Projects: image-projects.md
  - Release Notes: release-notes.md

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
