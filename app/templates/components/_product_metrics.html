<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

    <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-gradient-to-br from-blue-500/20 to-cyan-500/20 rounded-full blur-xl"></div>
    <div class="relative z-10">
      <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-cyan-600 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>

      <p class="text-3xl font-bold text-white">{{ product_metrics.total_quantity }}</p>
      <div class="mt-3 flex items-center">
        <div class="w-full bg-gray-700/50 rounded-full h-2">
          <div class="bg-gradient-to-r from-blue-500 to-cyan-600 h-2 rounded-full" style="width: 100%"></div>
        </div>
      </div>

  <!-- Total Cost Card -->
  <div class="relative overflow-hidden bg-gray-800/60 backdrop-blur-xl border border-gray-700/50 rounded-2xl shadow-2xl p-6 hover:transform hover:scale-105 transition-all duration-300">
    <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-gradient-to-br from-red-500/20 to-pink-500/20 rounded-full blur-xl"></div>
    <div class="relative z-10">
      <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 bg-gradient-to-br from-red-500 to-pink-600 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1"></path>

      </div>
      <h3 class="text-sm font-medium text-gray-300 mb-2">Custo do Estoque</h3>
      <p class="text-3xl font-bold text-white">R$ {{ product_metrics.total_cost_price }}</p>
      <div class="mt-3 flex items-center">
        <div class="w-full bg-gray-700/50 rounded-full h-2">
          <div class="bg-gradient-to-r from-red-500 to-pink-600 h-2 rounded-full" style="width: 85%"></div>
        </div>
      </div>

  <!-- Total Selling Price Card -->
  <div class="relative overflow-hidden bg-gray-800/60 backdrop-blur-xl border border-gray-700/50 rounded-2xl shadow-2xl p-6 hover:transform hover:scale-105 transition-all duration-300">
    <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-gradient-to-br from-green-500/20 to-emerald-500/20 rounded-full blur-xl"></div>
    <div class="relative z-10">
      <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 bg-gradient-to-br from-green-500 to-emerald-600 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 8h6m-5 0a3 3 0 110 6H9l3 3-3-3zm1 3h4m-4 0a3 3 0 104 0m-4 0v3m4-3v3"></path>

        <div class="text-2xl text-green-400">💸</div>
      </div>
      <h3 class="text-sm font-medium text-gray-300 mb-2">Valor do Estoque</h3>
      <p class="text-3xl font-bold text-white">R$ {{ product_metrics.total_selling_price }}</p>
      <div class="mt-3 flex items-center">

          <div class="bg-gradient-to-r from-green-500 to-emerald-600 h-2 rounded-full" style="width: 95%"></div>

    <div class="relative z-10">
      <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 bg-gradient-to-br from-yellow-500 to-orange-600 rounded-xl flex items-center justify-center">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>

        </div>
        <div class="text-2xl text-yellow-400">📈</div>
      </div>
      <h3 class="text-sm font-medium text-gray-300 mb-2">Lucro do Estoque</h3>
      <p class="text-3xl font-bold text-white">R$ {{ product_metrics.total_profit }}</p>
      <div class="mt-3 flex items-center">
        <div class="w-full bg-gray-700/50 rounded-full h-2">
          <div class="bg-gradient-to-r from-yellow-500 to-orange-600 h-2 rounded-full" style="width: 70%"></div>
        </div>
