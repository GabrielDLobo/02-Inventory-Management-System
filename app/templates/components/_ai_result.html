<!-- AI Assistant Section -->
<div class="relative mb-8">
  <div class="bg-gray-800/60 backdrop-blur-xl border border-gray-700/50 rounded-2xl shadow-2xl overflow-hidden">
    
    <!-- Header -->
    <div class="px-6 py-4 bg-gradient-to-r from-purple-600/20 to-blue-600/20 border-b border-gray-700/50">
      <button 
        id="aiToggleButton"
        class="w-full flex items-center justify-between text-left focus:outline-none group"
        onclick="toggleAISection()"
      >
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-600 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
            </svg>
          </div>
          <div>
            <h3 class="text-lg font-semibold text-white group-hover:text-purple-300 transition-colors duration-200">
              SGE Agent
            </h3>
            <p class="text-sm text-gray-400">Assistente Inteligente do Sistema</p>
          </div>
        </div>
        <div class="flex items-center space-x-2">
          <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
          <svg 
            id="aiChevron" 
            class="w-5 h-5 text-gray-400 transform transition-transform duration-200 group-hover:text-purple-300" 
            fill="none" 
            stroke="currentColor" 
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>
      </button>
    </div>

    <!-- AI Content -->
    <div id="aiContent" class="hidden overflow-hidden transition-all duration-300">
      <div class="p-6">
        <div class="bg-gray-700/30 rounded-xl p-4 border border-gray-600/30">
          <div class="flex items-start space-x-3">
            <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-blue-600 rounded-lg flex items-center justify-center flex-shrink-0 mt-1">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-4l-4 4-4-4z"></path>
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-sm text-gray-300 leading-relaxed">
                {{ ai_result|linebreaks }}
              </div>
            </div>
          </div>
        </div>
        
        <!-- AI Status Footer -->
        <div class="mt-4 flex items-center justify-between text-xs text-gray-500">
          <div class="flex items-center space-x-2">
            <div class="w-2 h-2 bg-green-400 rounded-full"></div>
            <span>Sistema ativo</span>
          </div>
          <div>
            Última atualização: Agora
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function toggleAISection() {
  const content = document.getElementById('aiContent');
  const chevron = document.getElementById('aiChevron');
  
  if (content.classList.contains('hidden')) {
    content.classList.remove('hidden');
    chevron.style.transform = 'rotate(180deg)';
  } else {
    content.classList.add('hidden');
    chevron.style.transform = 'rotate(0deg)';
  }
}
</script>
